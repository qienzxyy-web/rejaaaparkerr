<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kalkulator</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#1e1e1e;
    }

    .calculator{
      background:#2c2c2c;
      padding:20px;
      border-radius:15px;
      width:320px;
      box-shadow:0 0 15px rgba(0,0,0,0.5);
    }

    #display{
      width:100%;
      height:60px;
      margin-bottom:15px;
      font-size:28px;
      text-align:right;
      padding:10px;
      border:none;
      border-radius:10px;
      background:#111;
      color:white;
    }

    .buttons{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
    }

    button{
      height:60px;
      border:none;
      border-radius:10px;
      font-size:20px;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      opacity:0.8;
    }

    .number{
      background:#1b1818;
      color:white;
    }

    .operator{
      background:orange;
      color:white;
    }

    .special{
      background:#666;
      color:white;
    }

    .equal{
      background:#666;
      color:white;
    }
  </style>
</head>
<body>

  <div class="calculator">
    <input type="text" id="display" disabled>

    <div class="buttons">
      <button class="special" onclick="clearDisplay()">C</button>
      <button class="special" onclick="backspace()">⌫</button>
      <button class="special" onclick="appendValue('%')">%</button>
      <button class="operator" onclick="appendValue('/')">÷</button>

      <button class="number" onclick="appendValue('7')">7</button>
      <button class="number" onclick="appendValue('8')">8</button>
      <button class="number" onclick="appendValue('9')">9</button>
      <button class="operator" onclick="appendValue('*')">×</button>

      <button class="number" onclick="appendValue('4')">4</button>
      <button class="number" onclick="appendValue('5')">5</button>
      <button class="number" onclick="appendValue('6')">6</button>
      <button class="operator" onclick="appendValue('-')">−</button>

      <button class="number" onclick="appendValue('1')">1</button>
      <button class="number" onclick="appendValue('2')">2</button>
      <button class="number" onclick="appendValue('3')">3</button>
      <button class="operator" onclick="appendValue('+')">+</button>

      <button class="number" onclick="appendValue('0')">0</button>
      <button class="number" onclick="appendValue('.')">.</button>
      <button class="equal" style="grid-column: span 2;" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let display = document.getElementById("display");

    function appendValue(value){
      display.value += value;
    }

    function clearDisplay(){
      display.value = "";
    }

    function backspace(){
      display.value = display.value.slice(0, -1);
    }

    function calculate(){
      try{
        let expression = display.value.replace('%', '/100');
        display.value = eval(expression);
      } catch {
        display.value = "Error";
      }
    }
  </script>

</body>
</html>
